name: Release

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Build release artifacts without creating a GitHub Release"
        required: false
        default: true
        type: boolean

permissions:
  contents: write

env:
  BIN_NAME: mito-reth
  CARGO_TERM_COLOR: always

jobs:
  prepare:
    name: Prepare Release Context
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.meta.outputs.version }}
      release_enabled: ${{ steps.meta.outputs.release_enabled }}
    steps:
      - uses: actions/checkout@v5

      - id: meta
        shell: bash
        run: |
          set -euo pipefail

          version="${GITHUB_REF_NAME}"
          if [[ "${GITHUB_EVENT_NAME}" == "workflow_dispatch" ]]; then
            version="manual-${GITHUB_SHA::7}"
          fi

          release_enabled="false"
          if [[ "${GITHUB_EVENT_NAME}" == "push" ]]; then
            release_enabled="true"
          fi

          echo "version=${version}" >> "$GITHUB_OUTPUT"
          echo "release_enabled=${release_enabled}" >> "$GITHUB_OUTPUT"

      - name: Validate tag matches crate version
        if: ${{ github.event_name == 'push' }}
        shell: bash
        run: |
          set -euo pipefail

          crate_version="$(cargo metadata --no-deps --format-version 1 | jq -r '.packages[] | select(.name == "mito-reth") | .version')"
          tag_version="${GITHUB_REF_NAME#v}"

          if [[ -z "${crate_version}" ]]; then
            echo "Failed to read mito-reth crate version" >&2
            exit 1
          fi

          if [[ "${crate_version}" != "${tag_version}" ]]; then
            echo "Tag version (${tag_version}) does not match crate version (${crate_version})" >&2
            exit 1
          fi

  build:
    name: Build ${{ matrix.target }}
    needs: prepare
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            artifact_name: mito-reth-linux-amd64
            archive_name: mito-reth-linux-amd64.tar.gz
            binary_name: mito-reth
            package_format: tar.gz
          - os: ubuntu-24.04-arm
            target: aarch64-unknown-linux-gnu
            artifact_name: mito-reth-linux-arm64
            archive_name: mito-reth-linux-arm64.tar.gz
            binary_name: mito-reth
            package_format: tar.gz
          - os: macos-14
            target: aarch64-apple-darwin
            artifact_name: mito-reth-macos-arm64
            archive_name: mito-reth-macos-arm64.tar.gz
            binary_name: mito-reth
            package_format: tar.gz
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            artifact_name: mito-reth-windows-amd64
            archive_name: mito-reth-windows-amd64.zip
            binary_name: mito-reth.exe
            package_format: zip

    steps:
      - uses: actions/checkout@v5

      - uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: "1.91"
          targets: ${{ matrix.target }}

      - name: Install Linux system deps
        if: ${{ startsWith(matrix.os, 'ubuntu') }}
        run: sudo apt-get update && sudo apt-get install -y clang libclang-dev cmake pkg-config libssl-dev jq

      - uses: Swatinem/rust-cache@v2
        with:
          key: release-${{ matrix.target }}

      - name: Build
        shell: bash
        run: cargo build --release --bin $BIN_NAME --target ${{ matrix.target }}

      - name: Package archive
        shell: bash
        run: |
          set -euo pipefail

          staging_dir="${{ matrix.artifact_name }}"
          binary_path="target/${{ matrix.target }}/release/${{ matrix.binary_name }}"

          mkdir -p "$staging_dir"
          cp "$binary_path" "$staging_dir/${{ matrix.binary_name }}"

          if [[ "${{ matrix.package_format }}" == "zip" ]]; then
            powershell -Command "Compress-Archive -Path '$staging_dir\\*' -DestinationPath '${{ matrix.archive_name }}'"
          else
            tar -czf "${{ matrix.archive_name }}" "$staging_dir"
          fi

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: ${{ matrix.archive_name }}

  release:
    name: Create Release
    needs:
      - prepare
      - build
    if: ${{ needs.prepare.outputs.release_enabled == 'true' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.prepare.outputs.version }}
          files: artifacts/*
          generate_release_notes: true
