name: Release

on:
  push:
    tags: ["v*.*.*"]

permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            artifact: mi-reth-linux-amd64
          - os: ubuntu-latest
            target: aarch64-unknown-linux-gnu
            artifact: mi-reth-linux-arm64
            cross: true

    steps:
      - uses: actions/checkout@v4.2.2

      - uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: "1.91"
          targets: ${{ matrix.target }}

      - name: Install system deps (native)
        if: ${{ !matrix.cross }}
        run: sudo apt-get update && sudo apt-get install -y clang libclang-dev cmake pkg-config libssl-dev

      - uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.target }}

      - name: Install cross
        if: ${{ matrix.cross }}
        run: cargo install cross --git https://github.com/cross-rs/cross

      - name: Build (native)
        if: ${{ !matrix.cross }}
        run: cargo build --release --bin mi-reth

      - name: Build (cross)
        if: ${{ matrix.cross }}
        run: cross build --release --bin mi-reth --target ${{ matrix.target }}

      - name: Rename binary
        run: |
          TARGET_DIR=${{ matrix.cross && format('target/{0}', matrix.target) || 'target' }}
          cp ${TARGET_DIR}/release/mi-reth ${{ matrix.artifact }}

      - name: Upload artifact
        uses: actions/upload-artifact@v4.6.2
        with:
          name: ${{ matrix.artifact }}
          path: ${{ matrix.artifact }}

  release:
    name: Create Release
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4.2.2

      - uses: actions/download-artifact@v4.3.0
        with:
          path: artifacts/
          merge-multiple: true

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/*
          generate_release_notes: true
